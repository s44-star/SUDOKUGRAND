<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>SUDOKU GRAND — Arrival</title>
<style>
  :root{
    --void:#040507; --ink:#0a0c12;
    --gold:#d4a544; --gold-bright:#f0cd72; --gold-dim:#7a5e24;
    --neon:#c8943a; --foe:#a06828;
    --ash:#4a5266; --ice:#e8edf5;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
  html,body{height:100%;overflow:hidden}
  body{background:var(--void);color:var(--ice);
    font-family:"IBM Plex Mono",ui-monospace,Menlo,monospace;
    display:flex;align-items:center;justify-content:center;min-height:100vh;position:relative}

  /* the stage */
  #stage{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}

  /* ── the yantra (drawn with SVG, animated stroke) ── */
  .yantra-wrap{position:relative;width:min(78vw,340px);aspect-ratio:1;display:flex;align-items:center;justify-content:center}
  svg.yantra{width:100%;height:100%;overflow:visible}
  svg.yantra path,svg.yantra circle,svg.yantra polygon,svg.yantra line{
    stroke:var(--gold);fill:none;stroke-width:1;
    filter:drop-shadow(0 0 3px rgba(212,165,68,.5));
    stroke-dasharray:var(--len);stroke-dashoffset:var(--len);
  }
  /* the seed point */
  .bindu{position:absolute;width:8px;height:8px;border-radius:50%;background:var(--gold-bright);
    box-shadow:0 0 0 0 rgba(240,205,114,.7);opacity:0}

  /* title */
  .title-block{position:absolute;text-align:center;opacity:0;transform:translateY(8px)}
  .kicker{font-size:9px;letter-spacing:8px;color:var(--gold-dim);text-transform:uppercase;margin-bottom:10px}
  .title{font-size:clamp(26px,8vw,38px);letter-spacing:8px;font-weight:300;line-height:1;color:var(--ice)}
  .title b{font-weight:600;color:var(--gold-bright);text-shadow:0 0 24px rgba(240,205,114,.4)}
  .underline{width:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:14px auto 0}

  /* modes — appear last, quiet */
  .modes{position:absolute;bottom:8vh;width:100%;max-width:340px;padding:0 24px;
    display:flex;flex-direction:column;gap:12px;opacity:0;transform:translateY(12px)}
  .mode{position:relative;border:1px solid rgba(74,82,102,.3);border-radius:14px;padding:17px 20px;cursor:pointer;
    background:linear-gradient(165deg,rgba(10,8,4,.85),rgba(6,5,2,.95));overflow:hidden;transition:transform .15s ease}
  .mode:active{transform:scale(.98)}
  .mode .ml{font-size:16px;font-weight:700;letter-spacing:3px}
  .mode.adv .ml{color:var(--neon)} .mode.eli .ml{color:var(--foe)}
  .mode .md{font-size:9px;color:var(--ash);margin-top:3px;letter-spacing:1px}
  .mode .edge{position:absolute;left:0;top:0;bottom:0;width:2px;opacity:.6}
  .mode.adv .edge{background:var(--gold-bright)} .mode.eli .edge{background:var(--gold-dim)}

  /* ambient: faint drifting particles */
  .particles{position:fixed;inset:0;pointer-events:none;z-index:-1;opacity:0;transition:opacity 3s}
  .pt{position:absolute;width:2px;height:2px;border-radius:50%;background:var(--gold);opacity:.0}

  /* vignette */
  .vignette{position:fixed;inset:0;pointer-events:none;
    background:radial-gradient(70% 60% at 50% 45%,transparent 30%,rgba(4,5,7,.7) 100%)}

  /* tap-to-begin hint (audio needs a tap) */
  .tap-hint{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;
    background:var(--void);cursor:pointer;transition:opacity 1s}
  .tap-hint.gone{opacity:0;pointer-events:none}
  .tap-hint .th-inner{text-align:center}
  .tap-hint .th-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);margin:0 auto 18px;
    animation:breathe 2.4s ease-in-out infinite;box-shadow:0 0 16px var(--gold)}
  @keyframes breathe{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:1;transform:scale(1.4)}}
  .tap-hint .th-t{font-size:10px;letter-spacing:6px;color:var(--gold-dim);text-transform:uppercase}

  .replay{position:fixed;bottom:14px;right:14px;font-size:9px;letter-spacing:2px;color:#2a3142;
    cursor:pointer;z-index:60;text-transform:uppercase}

  /* game frame + back */
  #frameWrap{position:fixed;inset:0;z-index:40;opacity:0;pointer-events:none;transition:opacity .4s;background:var(--void)}
  #frameWrap.show{opacity:1;pointer-events:auto}
  #gameFrame{width:100%;height:100%;border:none;display:block}
  #backBtn{position:fixed;top:10px;left:10px;z-index:45;background:rgba(10,12,18,.9);border:1px solid rgba(212,165,68,.3);
    border-radius:20px;color:var(--gold-bright);font-family:inherit;font-size:10px;letter-spacing:2px;padding:8px 14px;
    cursor:pointer;display:none;text-transform:uppercase;backdrop-filter:blur(4px)}
  #backBtn.show{display:block}
  #backBtn:active{transform:scale(.95)}
</style>
</head>
<body>
<div class="particles" id="particles"></div>

<div id="stage">
  <div class="yantra-wrap">
    <div class="bindu" id="bindu"></div>
    <svg class="yantra" id="yantra" viewBox="0 0 300 300"></svg>
    <div class="title-block" id="titleBlock">
      <div class="kicker">enter the</div>
      <div class="title">SUDOKU <b>GRAND</b></div>
      <div class="underline" id="underline"></div>
    </div>
  </div>

  <div class="modes" id="modes">
    <div class="mode adv" onclick="window.location.href='advanced-final.html'">
      <div class="edge"></div>
      <div class="ml">ADVANCED</div>
      <div class="md">the solitary descent · solo</div>
    </div>
    <div class="mode eli" onclick="window.location.href='elite-final.html'">
      <div class="edge"></div>
      <div class="ml">ELITE</div>
      <div class="md">duel an ancient rival · 1v1</div>
    </div>
  </div>
</div>

<div id="frameWrap"><iframe id="gameFrame" allow="autoplay"></iframe></div>
<button id="backBtn" onclick="backToMenu()">‹ leave</button>

<div class="vignette"></div>

<div class="tap-hint" id="tapHint">
  <div class="th-inner">
    <div class="th-dot"></div>
    <div class="th-t">tap to enter</div>
  </div>
</div>

<div class="replay" id="replay">↻ replay intro</div>

<script>
/* ── build the yantra geometry (sacred geometry, drawn in order) ── */
const svg=document.getElementById("yantra");
const NS="http://www.w3.org/2000/svg";
const cx=150,cy=150;

// elements in DRAW ORDER (inside-out): bindu handled separately
const geom=[];
// inner triangles (downward + upward = the core hexagram, the "shakti/shiva" union)
geom.push({t:"polygon",pts:triPoints(cx,cy,70,true)});   // downward
geom.push({t:"polygon",pts:triPoints(cx,cy,70,false)});  // upward
// inner circle
geom.push({t:"circle",r:78});
// lotus petals (8)
for(let i=0;i<8;i++){ geom.push(petal(cx,cy,78,108,i*45)); }
// outer ring
geom.push({t:"circle",r:118});
// the bhupura (square gates) — 4 T-shapes, mythic frame
geom.push({t:"circle",r:128});

function triPoints(x,y,r,down){
  const pts=[];
  for(let i=0;i<3;i++){ const a=(down? 90: -90)+i*120; const rad=a*Math.PI/180;
    pts.push([x+Math.cos(rad)*r, y+Math.sin(rad)*r]); }
  return pts.map(p=>p.map(v=>v.toFixed(1)).join(",")).join(" ");
}
function petal(x,y,r1,r2,deg){
  const a=deg*Math.PI/180;
  const x1=x+Math.cos(a)*r1,y1=y+Math.sin(a)*r1;
  const x2=x+Math.cos(a)*r2,y2=y+Math.sin(a)*r2;
  const pa=a+0.28,pb=a-0.28;
  const cx1=x+Math.cos(pa)*((r1+r2)/2),cy1=y+Math.sin(pa)*((r1+r2)/2);
  const cx2=x+Math.cos(pb)*((r1+r2)/2),cy2=y+Math.sin(pb)*((r1+r2)/2);
  return {t:"path",d:`M${x1.toFixed(1)} ${y1.toFixed(1)} Q${cx1.toFixed(1)} ${cy1.toFixed(1)} ${x2.toFixed(1)} ${y2.toFixed(1)} Q${cx2.toFixed(1)} ${cy2.toFixed(1)} ${x1.toFixed(1)} ${y1.toFixed(1)} Z`};
}

const drawn=[];
for(const g of geom){
  let el;
  if(g.t==="circle"){ el=document.createElementNS(NS,"circle"); el.setAttribute("cx",cx);el.setAttribute("cy",cy);el.setAttribute("r",g.r); }
  else if(g.t==="polygon"){ el=document.createElementNS(NS,"polygon"); el.setAttribute("points",g.pts); }
  else if(g.t==="path"){ el=document.createElementNS(NS,"path"); el.setAttribute("d",g.d); }
  svg.appendChild(el);
  drawn.push(el);
}
// set dash lengths
function prep(){ drawn.forEach(el=>{ const len=el.getTotalLength?el.getTotalLength():300; el.style.setProperty("--len",len); el.style.strokeDashoffset=len; }); }

/* ── audio: a single deep resonant tone via WebAudio (no files) ── */
let actx=null;
function tone(freq,dur,delay,gainPeak){
  if(!actx)return;
  const t0=actx.currentTime+delay;
  const osc=actx.createOscillator(), g=actx.createGain();
  osc.type="sine"; osc.frequency.value=freq;
  // a subtle second harmonic for richness
  const osc2=actx.createOscillator(), g2=actx.createGain();
  osc2.type="sine"; osc2.frequency.value=freq*2.0; 
  g.gain.setValueAtTime(0,t0); g.gain.linearRampToValueAtTime(gainPeak,t0+0.08); g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
  g2.gain.setValueAtTime(0,t0); g2.gain.linearRampToValueAtTime(gainPeak*0.25,t0+0.08); g2.gain.exponentialRampToValueAtTime(0.0001,t0+dur*0.7);
  osc.connect(g).connect(actx.destination); osc2.connect(g2).connect(actx.destination);
  osc.start(t0); osc.stop(t0+dur); osc2.start(t0); osc2.stop(t0+dur);
}

/* ── the arrival sequence ── */
const bindu=document.getElementById("bindu");
function runIntro(){
  prep();
  // reset
  bindu.style.transition="none"; bindu.style.opacity="0"; bindu.style.boxShadow="0 0 0 0 rgba(240,205,114,.7)";
  drawn.forEach(el=>{ el.style.transition="none"; el.style.strokeDashoffset=el.style.getPropertyValue("--len"); el.style.opacity="1"; });
  document.getElementById("titleBlock").style.transition="none";
  document.getElementById("titleBlock").style.opacity="0";
  document.getElementById("titleBlock").style.transform="translateY(8px)";
  document.getElementById("underline").style.width="0";
  document.getElementById("modes").style.transition="none";
  document.getElementById("modes").style.opacity="0";
  document.getElementById("modes").style.transform="translateY(12px)";
  document.getElementById("particles").style.opacity="0";
  void svg.getBoundingClientRect();

  // 1) silence, then the bindu ignites (~600ms in)
  setTimeout(()=>{
    bindu.style.transition="opacity 1.2s ease, box-shadow 1.6s ease";
    bindu.style.opacity="1";
    bindu.style.boxShadow="0 0 18px 4px rgba(240,205,114,.6)";
    tone(110, 2.4, 0, 0.18); // deep root tone on ignition
  },600);

  // 2) the yantra draws itself, inside-out
  const drawStart=1500, perEl=140;
  drawn.forEach((el,i)=>{
    setTimeout(()=>{
      el.style.transition=`stroke-dashoffset 1.1s cubic-bezier(.4,0,.2,1)`;
      el.style.strokeDashoffset="0";
    }, drawStart + i*perEl);
  });

  // 3) bindu recedes as geometry completes; title resolves
  const titleAt = drawStart + drawn.length*perEl + 400;
  setTimeout(()=>{
    bindu.style.transition="opacity 1s ease";
    bindu.style.opacity="0";
    const tb=document.getElementById("titleBlock");
    tb.style.transition="opacity 1.4s ease, transform 1.4s cubic-bezier(.16,1,.3,1)";
    tb.style.opacity="1"; tb.style.transform="translateY(0)";
    document.getElementById("underline").style.transition="width 1.6s ease .3s";
    document.getElementById("underline").style.width="120px";
    // the yantra dims slightly so the title leads
    drawn.forEach(el=>{ el.style.transition="opacity 1.4s ease"; el.style.opacity="0.32"; });
    tone(146.83, 3.0, 0, 0.14); // a fifth above — the "resolve" tone
  }, titleAt);

  // 4) modes fade up, particles drift in
  setTimeout(()=>{
    const m=document.getElementById("modes");
    m.style.transition="opacity 1.6s ease, transform 1.6s cubic-bezier(.16,1,.3,1)";
    m.style.opacity="1"; m.style.transform="translateY(0)";
    document.getElementById("particles").style.opacity="1";
    startParticles();
  }, titleAt+1400);
}

/* ── ambient particles (gold dust, very subtle) ── */
let particlesStarted=false;
function startParticles(){
  if(particlesStarted)return; particlesStarted=true;
  const box=document.getElementById("particles");
  for(let i=0;i<18;i++){
    const p=document.createElement("div"); p.className="pt";
    const x=Math.random()*100, dur=8+Math.random()*10, delay=Math.random()*8;
    p.style.left=x+"vw"; p.style.top=(60+Math.random()*40)+"vh";
    box.appendChild(p);
    p.animate([
      {transform:"translateY(0)",opacity:0},
      {opacity:0.5,offset:0.2},
      {opacity:0.4,offset:0.8},
      {transform:"translateY(-70vh)",opacity:0}
    ],{duration:dur*1000,delay:delay*1000,iterations:Infinity,easing:"linear"});
  }
}

/* ── start on tap (unlocks audio) ── */
document.getElementById("tapHint").onclick=function(){
  try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){}
  this.classList.add("gone");
  runIntro();
};
document.getElementById("replay").onclick=runIntro;

/* ── launch a game into the frame ── */
function launchGame(url){
  var f=document.getElementById("gameFrame");
  f.src=url;
  document.getElementById("frameWrap").classList.add("show");
  document.getElementById("backBtn").classList.add("show");
}
function backToMenu(){
  document.getElementById("frameWrap").classList.remove("show");
  document.getElementById("backBtn").classList.remove("show");
  setTimeout(function(){ if(!document.getElementById("frameWrap").classList.contains("show")) document.getElementById("gameFrame").src="about:blank"; },420);
}
</script>
</body>
</html>
