<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>SUDOKU GRAND</title>
<!-- Telegram WebApp SDK -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<!-- TON Connect -->
<script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
<style>
  :root{
    --void:#040507;--gold:#d4a544;--gold-bright:#f0cd72;--gold-dim:#7a5e24;
    --ash:#4a5266;--ice:#e8edf5;--neon:#c8943a;--foe:#a06828;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
  html,body{height:100%;overflow:hidden}
  body{background:var(--void);color:var(--ice);
    font-family:"IBM Plex Mono",ui-monospace,Menlo,monospace;
    display:flex;align-items:center;justify-content:center;min-height:100vh;position:relative}

  #stage{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}

  /* ── YANTRA ── */
  .yantra-wrap{position:relative;width:min(78vw,340px);aspect-ratio:1;display:flex;align-items:center;justify-content:center}
  svg.yantra{width:100%;height:100%;overflow:visible}
  svg.yantra path,svg.yantra circle,svg.yantra polygon{
    stroke:var(--gold);fill:none;stroke-width:1;
    filter:drop-shadow(0 0 3px rgba(212,165,68,.5));
    stroke-dasharray:var(--len);stroke-dashoffset:var(--len);
  }
  .bindu{position:absolute;width:8px;height:8px;border-radius:50%;background:var(--gold-bright);
    box-shadow:0 0 16px var(--gold);opacity:0}

  /* ── TITLE ── */
  .title-block{position:absolute;text-align:center;opacity:0;transform:translateY(8px)}
  .kicker{font-size:9px;letter-spacing:8px;color:var(--gold-dim);text-transform:uppercase;margin-bottom:10px}
  .title{font-size:clamp(26px,8vw,38px);letter-spacing:8px;font-weight:300;color:var(--ice)}
  .title b{font-weight:600;color:var(--gold-bright);text-shadow:0 0 24px rgba(240,205,114,.4)}
  .underline{width:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:14px auto 0}

  /* ── WALLET STRIP ── */
  .wstrip{position:fixed;top:0;left:0;right:0;padding:12px 18px;
    display:flex;align-items:center;justify-content:space-between;
    background:linear-gradient(180deg,rgba(4,5,7,.96),transparent);z-index:20}
  .wstrip-l{font-size:9px;letter-spacing:4px;color:var(--gold-dim);text-transform:uppercase}
  .wstrip-r{display:flex;align-items:center;gap:8px}
  .wdot{width:6px;height:6px;border-radius:50%;background:#4fd6a8;box-shadow:0 0 8px #4fd6a8;display:none}
  .wdot.on{display:block}
  .waddr{font-size:9px;color:var(--ash);background:rgba(212,165,68,.06);
    border:1px solid rgba(212,165,68,.15);border-radius:20px;padding:4px 10px;display:none}
  .waddr.on{display:block}
  .wbtn{font-size:9px;letter-spacing:2px;color:var(--gold-bright);text-transform:uppercase;
    background:rgba(212,165,68,.1);border:1px solid rgba(212,165,68,.3);
    border-radius:20px;padding:6px 13px;cursor:pointer;font-family:inherit;white-space:nowrap}
  .wbtn:active{transform:scale(.95)}

  /* ── USER CARD (Telegram user info) ── */
  .ucard{position:fixed;top:48px;right:18px;z-index:20;
    display:none;align-items:center;gap:8px;
    background:rgba(212,165,68,.06);border:1px solid rgba(212,165,68,.14);
    border-radius:20px;padding:5px 12px 5px 6px}
  .ucard.on{display:flex}
  .ucard img{width:22px;height:22px;border-radius:50%;border:1px solid var(--gold-dim)}
  .ucard span{font-size:9px;color:var(--ash);letter-spacing:1px}
  .ucard .coins{color:var(--gold-bright);font-weight:600;margin-left:4px}

  /* ── MODES ── */
  .modes{position:absolute;bottom:6vh;width:100%;max-width:340px;padding:0 22px;
    display:flex;flex-direction:column;gap:10px;opacity:0;transform:translateY(12px)}
  .mode{position:relative;border:1px solid rgba(74,82,102,.3);border-radius:14px;
    padding:16px 20px;cursor:pointer;
    background:linear-gradient(165deg,rgba(10,8,4,.85),rgba(6,5,2,.95));
    overflow:hidden;transition:transform .15s,border-color .2s}
  .mode:active{transform:scale(.98)}
  .mode .ml{font-size:15px;font-weight:700;letter-spacing:3px}
  .mode.adv .ml{color:var(--neon)} .mode.eli .ml{color:var(--foe)} .mode.dly .ml{color:var(--gold-bright)}
  .mode .md{font-size:9px;color:var(--ash);margin-top:3px;letter-spacing:1px}
  .mode .edge{position:absolute;left:0;top:0;bottom:0;width:2px;opacity:.7}
  .mode.adv .edge{background:var(--gold-bright)} .mode.eli .edge{background:var(--gold-dim)} .mode.dly .edge{background:var(--gold)}
  .mode.dly{border-color:rgba(212,165,68,.22)}

  /* ── REFERRAL CARD ── */
  .refcard{position:relative;border:1px solid rgba(212,165,68,.2);border-radius:14px;
    padding:14px 18px;cursor:pointer;
    background:linear-gradient(165deg,rgba(14,10,2,.9),rgba(8,6,1,.95));
    overflow:hidden;transition:transform .15s}
  .refcard:active{transform:scale(.98)}
  .refcard .rt{font-size:12px;font-weight:700;letter-spacing:2px;color:var(--gold-bright)}
  .refcard .rd{font-size:9px;color:var(--ash);margin-top:3px;letter-spacing:1px}
  .refcard .redge{position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--gold);opacity:.5}
  .refcard .rbadge{position:absolute;right:14px;top:50%;transform:translateY(-50%);
    font-size:9px;color:var(--gold-bright);background:rgba(212,165,68,.14);
    border:1px solid rgba(212,165,68,.3);border-radius:10px;padding:3px 9px;letter-spacing:1px}

  /* ── HOW TO PLAY ── */
  .howbtn{display:block;text-align:center;font-size:10px;letter-spacing:3px;
    color:var(--gold-dim);text-transform:uppercase;text-decoration:none;
    padding:10px;border:1px solid rgba(212,165,68,.12);border-radius:10px;
    background:rgba(10,8,4,.5)}

  /* particles */
  .particles{position:fixed;inset:0;pointer-events:none;z-index:-1;opacity:0;transition:opacity 3s}
  .pt{position:absolute;width:2px;height:2px;border-radius:50%;background:var(--gold);opacity:0}
  .vignette{position:fixed;inset:0;pointer-events:none;
    background:radial-gradient(70% 60% at 50% 45%,transparent 30%,rgba(4,5,7,.7) 100%)}

  /* tap hint */
  .tap-hint{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;
    background:var(--void);cursor:pointer;transition:opacity .8s}
  .tap-hint.gone{opacity:0;pointer-events:none}
  .th-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);margin:0 auto 18px;
    animation:breathe 2.4s ease-in-out infinite;box-shadow:0 0 16px var(--gold)}
  @keyframes breathe{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:1;transform:scale(1.4)}}
  .th-t{font-size:10px;letter-spacing:6px;color:var(--gold-dim);text-transform:uppercase;text-align:center}
  .replay{position:fixed;bottom:14px;right:14px;font-size:9px;letter-spacing:2px;
    color:#2a3142;cursor:pointer;z-index:60;text-transform:uppercase}

  /* toast */
  #toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(16px);
    background:rgba(11,16,32,.95);border:1px solid rgba(212,165,68,.3);
    padding:11px 18px;border-radius:10px;font-size:11px;color:var(--gold-bright);
    opacity:0;pointer-events:none;transition:all .25s;z-index:99;max-width:88%;text-align:center}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- ── WALLET STRIP ── -->
<div class="wstrip">
  <div class="wstrip-l">Sudoku Grand</div>
  <div class="wstrip-r">
    <div class="wdot" id="wDot"></div>
    <div class="waddr" id="wAddr"></div>
    <button class="wbtn" id="wBtn">Connect Wallet</button>
  </div>
</div>

<!-- ── USER CARD ── -->
<div class="ucard" id="uCard">
  <img id="uPhoto" src="" alt=""/>
  <span id="uName">Player</span>
  <span class="coins">⊙ <span id="uCoins">0</span></span>
</div>

<div class="particles" id="particles"></div>
<div id="stage">
  <div class="yantra-wrap">
    <div class="bindu" id="bindu"></div>
    <svg class="yantra" id="yantra" viewBox="0 0 300 300"></svg>
    <div class="title-block" id="titleBlock">
      <div class="kicker">enter the</div>
      <div class="title">SUDOKU <b>GRAND</b></div>
      <div class="underline" id="underline"></div>
    </div>
  </div>

  <div class="modes" id="modes">
    <div class="mode adv" onclick="launch('advanced-final.html')">
      <div class="edge"></div>
      <div class="ml">ADVANCED</div>
      <div class="md">the solitary descent · solo</div>
    </div>
    <div class="mode eli" onclick="launch('elite-final.html')">
      <div class="edge"></div>
      <div class="ml">ELITE</div>
      <div class="md">duel an ancient rival · 1v1</div>
    </div>
    <div class="mode dly" onclick="launch('daily-final.html')">
      <div class="edge"></div>
      <div class="ml">DAILY TRIAL</div>
      <div class="md">one puzzle · whole world · today only</div>
    </div>
    <div class="refcard" id="refBtn">
      <div class="redge"></div>
      <div class="rt">INVITE FRIENDS</div>
      <div class="rd">both earn 50 coins on join</div>
      <div class="rbadge">+50 ⊙</div>
    </div>
    <a href="rules.html" class="howbtn">? HOW TO PLAY</a>
  </div>
</div>

<div class="vignette"></div>
<div class="tap-hint" id="tapHint">
  <div>
    <div class="th-dot"></div>
    <div class="th-t">tap to enter</div>
  </div>
</div>
<div class="replay" id="replay">↻ replay intro</div>
<div id="toast"></div>

<script>
/* ════════════════════════════════════════════════
   TELEGRAM WEBAPP SDK INIT
   ════════════════════════════════════════════════ */
const tg = window.Telegram?.WebApp;
let tgUser = null;

if(tg){
  tg.ready();
  tg.expand(); // full screen
  tg.setHeaderColor('#040507');
  tg.setBackgroundColor('#040507');
  // Disable vertical swipe to close (prevents accidental close)
  if(tg.disableVerticalSwipes) tg.disableVerticalSwipes();

  tgUser = tg.initDataUnsafe?.user || null;

  if(tgUser){
    // Show user card
    const card = document.getElementById('uCard');
    card.classList.add('on');
    document.getElementById('uName').textContent = tgUser.first_name || 'Player';
    if(tgUser.photo_url){
      document.getElementById('uPhoto').src = tgUser.photo_url;
    } else {
      document.getElementById('uPhoto').style.display = 'none';
    }
    // Load coins for this user
    const coins = getCoins(tgUser.id);
    document.getElementById('uCoins').textContent = coins.toLocaleString();

    // Check referral from start_param
    const startParam = tg.initDataUnsafe?.start_param;
    if(startParam && startParam.startsWith('ref_')){
      const referrerId = startParam.replace('ref_','');
      handleReferral(referrerId, tgUser.id);
    }
  }
}

/* ── HAPTICS helper ── */
function haptic(type='light'){
  try{ tg?.HapticFeedback?.impactOccurred(type); }catch(e){}
}
function hapticNotif(type='success'){
  try{ tg?.HapticFeedback?.notificationOccurred(type); }catch(e){}
}

/* ── COINS (localStorage, per Telegram user ID) ── */
function getCoins(uid){
  try{ return parseInt(localStorage.getItem('sg_coins_'+(uid||'guest'))||'0'); }catch(e){ return 0; }
}
function setCoins(uid, n){
  try{ localStorage.setItem('sg_coins_'+(uid||'guest'), n); }catch(e){}
  // Update display
  document.getElementById('uCoins').textContent = n.toLocaleString();
  if(typeof updateSpecBar==='function') updateSpecBar();
}
function addCoins(uid, n){
  const cur = getCoins(uid);
  setCoins(uid, cur + n);
  return cur + n;
}

/* ── REFERRAL SYSTEM ── */
function handleReferral(referrerId, newUserId){
  if(!referrerId || !newUserId) return;
  if(String(referrerId) === String(newUserId)) return; // can't refer yourself
  const key = 'sg_ref_done_'+newUserId;
  try{
    if(localStorage.getItem(key)) return; // already given bonus
    localStorage.setItem(key, '1');
    // Give new user bonus
    addCoins(newUserId, 50);
    // Give referrer bonus (stored for when they open the app)
    const refKey = 'sg_ref_pending_'+referrerId;
    const pending = parseInt(localStorage.getItem(refKey)||'0');
    localStorage.setItem(refKey, pending+50);
    toast('Welcome bonus! +50 coins earned 🎉');
  }catch(e){}
}

function claimPendingReferral(){
  if(!tgUser) return;
  try{
    const key = 'sg_ref_pending_'+tgUser.id;
    const pending = parseInt(localStorage.getItem(key)||'0');
    if(pending > 0){
      localStorage.removeItem(key);
      addCoins(tgUser.id, pending);
      toast('Friend joined! +'+pending+' coins earned ⊙');
    }
  }catch(e){}
}

/* ── SHARE / INVITE ── */
function shareReferral(){
  haptic('medium');
  if(!tgUser){ toast('Open in Telegram to invite friends'); return; }
  const botName = 'SudokuGrandBot'; // ← PUT YOUR BOT USERNAME HERE
  const refLink = `https://t.me/${botName}?start=ref_${tgUser.id}`;
  const text = `🎮 Play Sudoku Grand — mythic circuit sudoku on TON!\n\nSolve the yantra. Earn coins. Join daily trials.\n\n${refLink}`;
  if(tg?.openTelegramLink){
    tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(refLink)}&text=${encodeURIComponent(text)}`);
  } else {
    // Fallback — copy to clipboard
    navigator.clipboard?.writeText(refLink).then(()=>toast('Invite link copied!')).catch(()=>toast(refLink));
  }
}

document.getElementById('refBtn').addEventListener('click', shareReferral);

/* ════════════════════════════════════════════════
   TON CONNECT
   ════════════════════════════════════════════════ */
let tonUI = null, walletAddr = null;

function initTON(){
  try{
    tonUI = new TON_CONNECT_UI.TonConnectUI({
      manifestUrl:'https://sudoku.lexconv.com/tonconnect-manifest.json',
      buttonRootId: null
    });
    tonUI.onStatusChange(wallet=>{
      if(wallet){
        walletAddr = wallet.account.address;
        const short = walletAddr.slice(0,4)+'...'+walletAddr.slice(-4);
        document.getElementById('wAddr').textContent = short;
        document.getElementById('wAddr').classList.add('on');
        document.getElementById('wDot').classList.add('on');
        document.getElementById('wBtn').textContent = 'Disconnect';
        try{ localStorage.setItem('sg_ton_addr', walletAddr); }catch(e){}
        hapticNotif('success');
        toast('Wallet connected ✓');
      } else {
        walletAddr = null;
        document.getElementById('wAddr').classList.remove('on');
        document.getElementById('wDot').classList.remove('on');
        document.getElementById('wBtn').textContent = 'Connect Wallet';
        try{ localStorage.removeItem('sg_ton_addr'); }catch(e){}
      }
    });
  }catch(e){ console.warn('TON init:',e); }
}

document.getElementById('wBtn').addEventListener('click', async()=>{
  haptic();
  if(!tonUI) return;
  if(walletAddr) await tonUI.disconnect();
  else await tonUI.openModal();
});

/* ════════════════════════════════════════════════
   YANTRA (exact same as original)
   ════════════════════════════════════════════════ */
const svg=document.getElementById("yantra");
const NS="http://www.w3.org/2000/svg";
const cx=150,cy=150,geom=[];
geom.push({t:"polygon",pts:triPts(cx,cy,70,true)});
geom.push({t:"polygon",pts:triPts(cx,cy,70,false)});
geom.push({t:"circle",r:78});
for(let i=0;i<8;i++) geom.push(petal(cx,cy,78,108,i*45));
geom.push({t:"circle",r:118});
geom.push({t:"circle",r:128});

function triPts(x,y,r,down){
  const p=[];for(let i=0;i<3;i++){const a=(down?90:-90)+i*120,rad=a*Math.PI/180;p.push([x+Math.cos(rad)*r,y+Math.sin(rad)*r]);}
  return p.map(q=>q.map(v=>v.toFixed(1)).join(",")).join(" ");
}
function petal(x,y,r1,r2,deg){
  const a=deg*Math.PI/180,x1=x+Math.cos(a)*r1,y1=y+Math.sin(a)*r1,x2=x+Math.cos(a)*r2,y2=y+Math.sin(a)*r2;
  const pa=a+0.28,pb=a-0.28;
  const cx1=x+Math.cos(pa)*((r1+r2)/2),cy1=y+Math.sin(pa)*((r1+r2)/2);
  const cx2=x+Math.cos(pb)*((r1+r2)/2),cy2=y+Math.sin(pb)*((r1+r2)/2);
  return {t:"path",d:`M${x1.toFixed(1)} ${y1.toFixed(1)} Q${cx1.toFixed(1)} ${cy1.toFixed(1)} ${x2.toFixed(1)} ${y2.toFixed(1)} Q${cx2.toFixed(1)} ${cy2.toFixed(1)} ${x1.toFixed(1)} ${y1.toFixed(1)} Z`};
}
const drawn=[];
for(const g of geom){
  let el;
  if(g.t==="circle"){el=document.createElementNS(NS,"circle");el.setAttribute("cx",cx);el.setAttribute("cy",cy);el.setAttribute("r",g.r);}
  else if(g.t==="polygon"){el=document.createElementNS(NS,"polygon");el.setAttribute("points",g.pts);}
  else{el=document.createElementNS(NS,"path");el.setAttribute("d",g.d);}
  svg.appendChild(el);drawn.push(el);
}
function prep(){drawn.forEach(el=>{const len=el.getTotalLength?el.getTotalLength():300;el.style.setProperty("--len",len);el.style.strokeDashoffset=len;});}

/* ── AUDIO ── */
let actx=null;
function tone(freq,dur,delay,gainPeak){
  if(!actx)return;
  const t0=actx.currentTime+delay;
  const osc=actx.createOscillator(),g=actx.createGain();
  osc.type="sine";osc.frequency.value=freq;
  g.gain.setValueAtTime(0,t0);g.gain.linearRampToValueAtTime(gainPeak,t0+0.08);g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
  osc.connect(g).connect(actx.destination);osc.start(t0);osc.stop(t0+dur);
}

/* ── INTRO ── */
const bindu=document.getElementById("bindu");
function runIntro(){
  prep();
  bindu.style.transition="none";bindu.style.opacity="0";
  drawn.forEach(el=>{el.style.transition="none";el.style.strokeDashoffset=el.style.getPropertyValue("--len");el.style.opacity="1";});
  document.getElementById("titleBlock").style.cssText="transition:none;opacity:0;transform:translateY(8px)";
  document.getElementById("underline").style.width="0";
  document.getElementById("modes").style.cssText="transition:none;opacity:0;transform:translateY(12px)";
  document.getElementById("particles").style.opacity="0";
  void svg.getBoundingClientRect();

  setTimeout(()=>{
    bindu.style.transition="opacity 1.2s ease,box-shadow 1.6s ease";
    bindu.style.opacity="1";
    bindu.style.boxShadow="0 0 18px 4px rgba(240,205,114,.6)";
    tone(110,2.4,0,0.18);
  },600);

  const drawStart=1500,perEl=140;
  drawn.forEach((el,i)=>setTimeout(()=>{
    el.style.transition="stroke-dashoffset 1.1s cubic-bezier(.4,0,.2,1)";
    el.style.strokeDashoffset="0";
  },drawStart+i*perEl));

  const titleAt=drawStart+drawn.length*perEl+400;
  setTimeout(()=>{
    bindu.style.transition="opacity 1s ease";bindu.style.opacity="0";
    const tb=document.getElementById("titleBlock");
    tb.style.transition="opacity 1.4s ease,transform 1.4s cubic-bezier(.16,1,.3,1)";
    tb.style.opacity="1";tb.style.transform="translateY(0)";
    document.getElementById("underline").style.transition="width 1.6s ease .3s";
    document.getElementById("underline").style.width="120px";
    drawn.forEach(el=>{el.style.transition="opacity 1.4s ease";el.style.opacity="0.32";});
    tone(146.83,3.0,0,0.14);
  },titleAt);

  setTimeout(()=>{
    const m=document.getElementById("modes");
    m.style.transition="opacity 1.6s ease,transform 1.6s cubic-bezier(.16,1,.3,1)";
    m.style.opacity="1";m.style.transform="translateY(0)";
    document.getElementById("particles").style.opacity="1";
    startParticles();
    initTON();
    claimPendingReferral();
  },titleAt+1400);
}

/* ── PARTICLES ── */
let psStarted=false;
function startParticles(){
  if(psStarted)return;psStarted=true;
  const box=document.getElementById("particles");
  for(let i=0;i<18;i++){
    const p=document.createElement("div");p.className="pt";
    p.style.left=Math.random()*100+"vw";p.style.top=(60+Math.random()*40)+"vh";
    box.appendChild(p);
    p.animate([{transform:"translateY(0)",opacity:0},{opacity:.5,offset:.2},{opacity:.4,offset:.8},{transform:"translateY(-70vh)",opacity:0}],
      {duration:(8+Math.random()*10)*1000,delay:Math.random()*8*1000,iterations:Infinity,easing:"linear"});
  }
}

/* ── TOAST ── */
function toast(m,d=2200){
  const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),d);
}

/* ── LAUNCH GAME ── */
function launch(url){
  haptic('medium');
  try{
    if(walletAddr) sessionStorage.setItem('sg_ton_addr',walletAddr);
    if(tgUser) sessionStorage.setItem('sg_tg_uid',tgUser.id);
  }catch(e){}
  window.location.href=url;
}

/* ── TAP TO START ── */
document.getElementById("tapHint").onclick=function(){
  try{actx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}
  haptic('light');
  this.classList.add("gone");
  runIntro();
};
document.getElementById("replay").onclick=()=>{haptic();runIntro();};

/* ── SKIP INTRO (back from game) ── */
if(new URLSearchParams(location.search).get("menu")==="1"){
  document.getElementById("tapHint").classList.add("gone");
  try{actx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}
  document.getElementById("modes").style.cssText="opacity:1;transform:translateY(0)";
  document.getElementById("titleBlock").style.cssText="opacity:1;transform:translateY(0)";
  drawn.forEach(el=>{el.style.strokeDashoffset="0";el.style.opacity="0.32";});
  startParticles();
  setTimeout(()=>{initTON();claimPendingReferral();},400);
}

/* ── Telegram back button (when inside Mini App) ── */
if(tg?.BackButton){
  // Only show back button inside games, not on menu
  tg.BackButton.hide();
}
</script>
